<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Angelina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="rotate-device">
        <div class="phone-icon"></div>
        <p>Пожалуйста, переверните устройство горизонтально</p>
    </div>

    <div id="main-content">
        <div id="stars-bg"></div>
        <canvas id="matrix"></canvas>
        
        <div id="start-screen">
            <button id="start-btn">Нажми, чтобы начать</button>
        </div>

        <div id="overlay">
            <div id="countdown" class="plain-text"></div>
            <div id="text-sequence" class="plain-text"></div>
            <div id="heart">❤</div>
        </div>

        <div id="wish-box" class="wish-container">
            <div id="wish-text"></div>
        </div>

        <div id="card-container">
            </div>

        <div id="heart-gallery"></div>
    </div>

    <audio id="bg-music" src="music.mp3" loop></audio>

    <script src="script.js"></script>
</body>
</html>
